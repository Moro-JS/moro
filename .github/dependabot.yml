version: 2
updates:
  # Keep GitHub Actions pinned versions current (and, once SHA-pinned, bump the
  # SHAs) so third-party/first-party actions don't drift on mutable tags.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      actions:
        patterns:
          - '*'

  # npm devDependencies (runtime deps are a single first-party package).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
