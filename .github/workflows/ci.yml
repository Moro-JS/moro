name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

# Least-privilege default for every job; jobs that need more opt in explicitly.
permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Type-check tests
        run: npm run typecheck:tests

      - name: Check formatting
        run: npm run format:check

  # Runs WITHOUT the native engine on purpose: the Node-fallback path is a
  # first-class product property and must stay green on its own.
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Oldest engine-supported line (20) through newest (26) — test what we
        # ship binaries for and what @morojs/engine requires (Node >=20).
        node-version: [20, 22, 24, 26]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # MORO_REQUIRE_ENGINE=1: the engine-path integration tests must RUN against
      # the npm-installed engine, not describe.skip / fall back to Node's http.
      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          MORO_REQUIRE_ENGINE: '1'

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # Coverage runs once (not per matrix leg) and enforces the coverageThreshold
  # floor in jest.config.mjs, so a drop below the ratchet fails the build.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report (enforces coverageThreshold)
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-format, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate --omit=dev

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [lint-and-format, test, coverage, build, security-audit]
    if: github.event_name == 'release' && github.event.release.prerelease == false
    permissions:
      contents: read
      id-token: write # required for npm provenance / trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing (tokenless publish) needs npm >= 11.5.1. Node 20
      # ships npm 10.x, and npm@latest is now 12.x (which dropped Node 20 support),
      # so pin the 11.x line — it supports Node 20.17+ and does trusted publishing.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # The tag the release was cut from must match the version being published,
      # so a moved/mismatched tag can never ship a wrong-versioned tarball.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          echo "package.json: ${PKG_VERSION}   release tag: ${TAG}"
          if [ "${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::Release tag ${TAG} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Build project
        run: npm run build

      # Run the project's own tarball validators (pack + install into a temp
      # project + import as a consumer) instead of only `npm pack --dry-run`.
      - name: Validate dist
        run: node scripts/validate-dist.mjs

      - name: Validate published package
        run: node scripts/validate-package.mjs

      # OIDC trusted publishing: npm authenticates via the id-token exchange
      # (id-token: write above + the trusted publisher configured on npmjs.com),
      # so no NPM_TOKEN is needed. --provenance publishes a signed
      # build-provenance attestation, giving consumers source-to-artifact
      # traceability.
      - name: Publish to NPM
        run: npm publish --access public --provenance
